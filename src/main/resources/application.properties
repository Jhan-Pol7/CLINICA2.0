# ===== H2 — base de datos embebida (modo archivo) =====
db.url=jdbc:h2:file:./data/clinica;AUTO_SERVER=FALSE;DB_CLOSE_ON_EXIT=FALSE
db.driver=org.h2.Driver
db.username=sa
db.password=
# ===== HikariCP — pool de conexiones =====
db.pool.maximumPoolSize=5
db.pool.minimumIdle=1
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000
db.pool.maxLifetime=1800000
# ===== DDL — inicialización automática =====
db.ddl.auto=true
db.ddl.script=schema_clinica.sql
